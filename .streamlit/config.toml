# Streamlit configuration -- applies on both local and cloud.

[server]
headless = true
runOnSave = false
maxUploadSize = 50
# Disable XSRF + CORS so file uploads work behind HF's reverse proxy.
# Without this, Streamlit rejects uploads with 403 because the origin
# header (hf.space) doesn't match the server's own address.
enableXsrfProtection = false
enableCORS = false

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#F0A500"
backgroundColor = "#080B10"
secondaryBackgroundColor = "#0D1117"
textColor = "#E2E8F0"
font = "monospace"
