# Streamlit configuration -- applies on both local and cloud.

[server]
headless = true
runOnSave = false
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#F0A500"
backgroundColor = "#080B10"
secondaryBackgroundColor = "#0D1117"
textColor = "#E2E8F0"
font = "monospace"
